<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EpargnePro — Produits d'épargne bancaire</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0C1B33;--navy2:#1a2d4a;
  --gold:#B8860B;--gold2:#DAA520;--gold-light:#FDF3D0;
  --ct:#0F6E56;--ct2:#1D9E75;--ct-bg:#E1F5EE;--ct-t:#085041;
  --mt:#185FA5;--mt2:#378ADD;--mt-bg:#E6F1FB;--mt-t:#0C447C;
  --lt:#534AB7;--lt2:#7F77DD;--lt-bg:#EEEDFE;--lt-t:#26215C;
  --off:#F7F6F3;--border:#E2DFD8;--text:#1C1C1A;--muted:#666660;
}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--off);color:var(--text);font-size:14px}
.topbar{background:var(--navy);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:50px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:26px;height:26px;background:var(--gold2);border-radius:4px;display:flex;align-items:center;justify-content:center}
.brand-name{font-size:13px;font-weight:500;color:#fff;letter-spacing:0.04em}
.brand-sub{font-size:10px;color:#8899AA;letter-spacing:0.06em;text-transform:uppercase}
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-label{font-size:11px;color:#8899AA}
.prog-bar-bg{width:90px;height:4px;background:#1e3050;border-radius:2px;overflow:hidden}
.prog-bar-fg{height:100%;background:var(--gold2);border-radius:2px;transition:width .4s}
.nav{background:var(--navy2);padding:0 20px;display:flex;gap:0;border-bottom:1px solid #1e3050;overflow-x:auto}
.nb{padding:11px 14px;font-size:11px;font-weight:500;color:#8899AA;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap}
.nb:hover{color:#CBD5E0}
.nb.active{color:#fff;border-bottom-color:var(--gold2)}
.hero{background:var(--navy);padding:28px 20px 24px}
.hero-eyebrow{font-size:10px;font-weight:500;color:var(--gold2);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px}
.hero-title{font-size:20px;font-weight:500;color:#fff;margin-bottom:5px}
.hero-desc{font-size:12px;color:#8899AA;line-height:1.6;max-width:500px}
.hero-stats{display:flex;gap:20px;margin-top:18px}
.stat{text-align:center}
.stat-n{font-size:20px;font-weight:500;color:#fff}
.stat-l{font-size:10px;color:#8899AA;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px}
.sdiv{width:1px;background:#1e3050}
.cat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 20px}
.cat-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;border-top:3px solid;transition:all .15s}
.cat-card:hover{background:#FDFCFA;border-color:#B0ABA0}
.cat-card .cc-icon{font-size:20px;margin-bottom:8px}
.cat-card .cc-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px}
.cat-card .cc-info{font-size:11px;color:var(--muted)}
.cat-card .cc-link{margin-top:8px;font-size:11px;font-weight:500}
.rule-box{margin:0 20px 20px;background:var(--navy);border-radius:8px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.rule-icon{width:30px;height:30px;background:rgba(218,165,32,0.15);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rule-title{font-size:12px;font-weight:500;color:#fff;margin-bottom:3px}
.rule-text{font-size:11px;color:#8899AA;line-height:1.6}
.cat-strip{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--off);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.cs-left{display:flex;align-items:center;gap:8px}
.cs-dot{width:9px;height:9px;border-radius:50%}
.cs-name{font-size:12px;font-weight:500;color:var(--text)}
.cs-hz{font-size:11px;color:var(--muted);margin-left:4px}
.cs-chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;padding:14px 20px}
.ptile{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 12px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.ptile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.ptile.ct::before{background:var(--ct2)}
.ptile.mt::before{background:var(--mt2)}
.ptile.lt::before{background:var(--lt2)}
.ptile:hover{border-color:#B0ABA0;background:#FDFCFA}
.ptile.seen::after{content:'';position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--gold2)}
.tile-icon{font-size:20px;margin-bottom:8px}
.tile-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:3px}
.tile-cat{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:14px 20px 0;width:100%}
.back-btn:hover{color:var(--text)}
.dcard{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:10px 20px 20px}
.dh{padding:18px 20px;border-bottom:1px solid var(--border)}
.dh-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px;flex-wrap:wrap}
.dh-left{display:flex;align-items:center;gap:12px}
.dh-title{font-size:17px;font-weight:500;color:var(--text);margin-bottom:3px}
.dh-sub{font-size:12px;color:var(--muted)}
.dh-badge{font-size:11px;font-weight:500;padding:4px 11px;border-radius:99px;white-space:nowrap}
.dh-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.dtag{font-size:11px;padding:3px 9px;border-radius:4px;background:var(--off);color:var(--muted);border:1px solid var(--border)}
.dsec{padding:16px 20px;border-bottom:1px solid var(--border)}
.dsec-title{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fi{background:var(--off);border-radius:6px;padding:9px 11px}
.fi-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px}
.fi-v{font-size:12px;font-weight:500;color:var(--text)}
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pcbox{border-radius:6px;padding:11px 13px}
.pcbox.pros{background:#E1F5EE}
.pcbox.cons{background:#FCEBEB}
.pcbox-t{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:7px}
.pcbox.pros .pcbox-t{color:#0F6E56}
.pcbox.cons .pcbox-t{color:#A32D2D}
.pci{display:flex;align-items:flex-start;gap:5px;margin-bottom:5px;font-size:11px;line-height:1.4}
.pcbox.pros .pci{color:#085041}
.pcbox.cons .pci{color:#791F1F}
.pcdot{width:4px;height:4px;border-radius:50%;margin-top:4px;flex-shrink:0}
.pcbox.pros .pcdot{background:#1D9E75}
.pcbox.cons .pcdot{background:#E24B4A}
.memo-box{background:var(--gold-light);border-radius:6px;padding:11px 13px;display:flex;gap:9px;align-items:flex-start}
.memo-text{font-size:11px;color:#7A6200;line-height:1.5}
.dnav{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-top:1px solid var(--border)}
.dnav-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:5px;padding:6px 12px;cursor:pointer;transition:all .15s}
.dnav-btn:hover:not(:disabled){color:var(--text);border-color:#B0ABA0}
.dnav-btn:disabled{opacity:0.3;cursor:default}
.dnav-pos{font-size:11px;color:var(--muted)}
.recap-wrap{padding:16px 20px}
.rtable{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:16px}
.rtable th{background:var(--navy);color:#CBD5E0;padding:9px 12px;text-align:left;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em}
.rtable td{padding:10px 12px;border-top:1px solid var(--border);color:var(--text);font-size:12px}
.rtable tr:hover td{background:#FDFCFA}
.rtable tr.rc td{border-left:3px solid var(--ct2)}
.rtable tr.rm td{border-left:3px solid var(--mt2)}
.rtable tr.rl td{border-left:3px solid var(--lt2)}
.ex-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.excard{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 14px;border-top:3px solid}
.ex-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px}
.ex-prod{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px}
.ex-obj{font-size:11px;color:var(--muted);margin-bottom:8px}
.ex-amt{font-size:20px;font-weight:500}
.kp-box{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.kp-hd{background:var(--navy);padding:10px 16px;font-size:10px;font-weight:500;color:#CBD5E0;text-transform:uppercase;letter-spacing:0.07em}
.kpi{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-top:1px solid var(--border)}
.kpi-icon{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-text{font-size:11px;color:var(--text);line-height:1.5;padding-top:4px}
.quiz-wrap{padding:16px 20px}
.qprog{display:flex;gap:4px;margin-bottom:16px}
.qpd{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s}
.qpd.done{background:var(--gold2)}
.qcard{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px}
.qhd{background:var(--navy);padding:14px 18px}
.qnum{font-size:10px;color:#8899AA;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:3px}
.qtext{font-size:13px;font-weight:500;color:#fff;line-height:1.4}
.qopts{padding:12px 18px;display:flex;flex-direction:column;gap:7px}
.qopt{background:var(--off);border:1px solid var(--border);border-radius:5px;padding:10px 13px;font-size:12px;cursor:pointer;color:var(--text);text-align:left;transition:all .15s;line-height:1.4}
.qopt:hover:not(:disabled){background:#FDFCFA;border-color:#B0ABA0}
.qopt.correct{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.qopt.wrong{background:#FCEBEB;border-color:#E24B4A;color:#791F1F}
.qopt:disabled{cursor:default}
.qfb{margin:0 18px 14px;padding:10px 12px;border-radius:5px;font-size:11px;line-height:1.5}
.qfb.ok{background:#E1F5EE;color:#085041}
.qfb.ko{background:#FCEBEB;color:#791F1F}
.score-box{background:#fff;border:1px solid var(--border);border-radius:10px;padding:24px 20px;text-align:center;margin-top:8px}
.score-ring{display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;border-radius:50%;background:var(--navy);margin-bottom:10px}
.score-n{font-size:22px;font-weight:500;color:#fff}
.score-msg{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.score-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
.reset-btn{background:var(--navy);color:#fff;border:none;border-radius:6px;padding:8px 22px;font-size:12px;cursor:pointer;font-weight:500}
@media(max-width:600px){
  .cat-cards{grid-template-columns:1fr}
  .fields-grid{grid-template-columns:1fr}
  .pc-grid{grid-template-columns:1fr}
  .ex-grid{grid-template-columns:1fr}
  .dh-top{flex-direction:column}
}
</style>
</head>
<body>

<div id="app">
<div class="topbar">
  <div class="brand">
    <div class="brand-logo"><i class="ti ti-building-bank" style="color:#0C1B33;font-size:14px"></i></div>
    <div>
      <div class="brand-name">EpargnePro</div>
      <div class="brand-sub">Formation bancaire</div>
    </div>
  </div>
  <div class="prog-wrap">
    <span class="prog-label" id="prog-lbl">0 / 20</span>
    <div class="prog-bar-bg"><div class="prog-bar-fg" id="prog-fg" style="width:0%"></div></div>
  </div>
</div>
<nav class="nav">
  <button class="nb active" data-page="accueil" onclick="go('accueil')"><i class="ti ti-home" style="font-size:12px;margin-right:3px"></i>Accueil</button>
  <button class="nb" data-page="ct" onclick="go('ct')"><i class="ti ti-clock" style="font-size:12px;margin-right:3px"></i>Court terme</button>
  <button class="nb" data-page="mt" onclick="go('mt')"><i class="ti ti-calendar" style="font-size:12px;margin-right:3px"></i>Moyen terme</button>
  <button class="nb" data-page="lt" onclick="go('lt')"><i class="ti ti-trending-up" style="font-size:12px;margin-right:3px"></i>Long terme</button>
  <button class="nb" data-page="recap" onclick="go('recap')"><i class="ti ti-table" style="font-size:12px;margin-right:3px"></i>Récapitulatif</button>
  <button class="nb" data-page="quiz" onclick="go('quiz')"><i class="ti ti-certificate" style="font-size:12px;margin-right:3px"></i>Quiz</button>
</nav>
<div id="content"></div>
</div>

const QUIZ=[
  {q:'Quel livret réglementé est accessible à tous, totalement exonéré d\'impôts et offre un taux de 3 % nets ?',o:['LEP','LDDS','Livret A','Livret Jeune'],a:2,e:'Le Livret A est exonéré d\'IR et de prélèvements sociaux, accessible à tous publics, avec un plafond de 22 950 €.'},

  {q:'Quel produit donne un droit à prêt immobilier et nécessite des versements annuels minimum de 540 € ?',o:['CEL','Compte à terme','PEL','PER'],a:2,e:'Le PEL (Plan d\'Épargne Logement) ouvre un droit à prêt immobilier. Il exige un versement minimum annuel de 540 €.'},

];
const seen=new Set();
let quizState={},quizScore=0;
function updProg(){const n=seen.size;document.getElementById('prog-lbl').textContent=n+' / 20';document.getElementById('prog-fg').style.width=Math.round(n/20*100)+'%';}
function setNav(p){document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.dataset.page===p));}
function go(p){setNav(p);if(p==='accueil')rAccueil();else if(p==='ct'||p==='mt'||p==='lt')rList(p);else if(p==='recap')rRecap();else if(p==='quiz')rQuiz();}
function show(h){document.getElementById('content').innerHTML=h;}
function rAccueil(){show(`<div class="hero"><div class="hero-eyebrow">Module 3 — Conseil clientèle</div><div class="hero-title">Produits d'épargne bancaire</div><div class="hero-desc">Explorez les 20 produits d'épargne organisés par horizon de placement. Cliquez sur chaque produit pour découvrir sa fiche complète.</div><div class="hero-stats"><div class="stat"><div class="stat-n">20</div><div class="stat-l">Produits</div></div><div class="sdiv"></div><div class="stat"><div class="stat-n">3</div><div class="stat-l">Catégories</div></div><div class="sdiv"></div><div class="stat"><div class="stat-n" id="hs">${seen.size}</div><div class="stat-l">Consultés</div></div></div></div><div class="cat-cards"><div class="cat-card" style="border-top-color:#1D9E75" onclick="go('ct')"><div class="cc-icon"><i class="ti ti-clock" style="color:#1D9E75;font-size:20px"></i></div><div class="cc-name">Court terme</div><div class="cc-info">7 produits · moins de 2 ans</div><div class="cc-link" style="color:#0F6E56">Explorer <i class="ti ti-arrow-right"></i></div></div><div class="cat-card" style="border-top-color:#378ADD" onclick="go('mt')"><div class="cc-icon"><i class="ti ti-calendar" style="color:#378ADD;font-size:20px"></i></div><div class="cc-name">Moyen terme</div><div class="cc-info">5 produits · 2 à 8 ans</div><div class="cc-link" style="color:#185FA5">Explorer <i class="ti ti-arrow-right"></i></div></div><div class="cat-card" style="border-top-color:#7F77DD" onclick="go('lt')"><div class="cc-icon"><i class="ti ti-trending-up" style="color:#7F77DD;font-size:20px"></i></div><div class="cc-name">Long terme</div><div class="cc-info">8 produits · plus de 8 ans</div><div class="cc-link" style="color:#534AB7">Explorer <i class="ti ti-arrow-right"></i></div></div></div><div class="rule-box"><div class="rule-icon"><i class="ti ti-scale" style="color:#DAA520;font-size:16px"></i></div><div><div class="rule-title">Règle fondamentale — Risque vs. Rendement</div><div class="rule-text">Plus l'horizon de placement est long et le risque accepté élevé, plus le potentiel de rendement est important. Un placement sécurisé offre en contrepartie un rendement limité.</div></div></div>`);}
function rList(cat){const m=CM[cat];const tiles=DB[cat].map((p,i)=>`<div class="ptile ${cat}${seen.has(p.id)?' seen':''}" onclick="oDet('${cat}',${i})" tabindex="0" onkeydown="if(event.key==='Enter')oDet('${cat}',${i})"><div class="tile-icon"><i class="ti ${p.ic}" style="color:${m.color};font-size:20px"></i></div><div class="tile-name">${p.n}</div><div class="tile-cat ${cat}">${m.label}</div></div>`).join('');show(`<div class="cat-strip"><div class="cs-left"><div class="cs-dot" style="background:${m.color}"></div><span class="cs-name">${m.label}</span><span class="cs-hz">${m.hz}</span></div><div class="cs-chips">${m.chips.map(c=>`<span class="chip" style="background:${m.bg};color:${m.tc};border:1px solid ${m.tc}33">${c}</span>`).join('')}</div></div><p style="font-size:11px;color:var(--muted);padding:10px 20px 0">Cliquez sur un produit pour afficher sa fiche complète.</p><div class="prod-grid">${tiles}</div>`);}
function oDet(cat,idx){const p=DB[cat][idx];const m=CM[cat];seen.add(p.id);updProg();setNav('');const prods=DB[cat];const hp=idx>0,hn=idx<prods.length-1;show(`<button class="back-btn" onclick="go('${cat}')"><i class="ti ti-arrow-left" style="font-size:13px"></i> Retour — ${m.label}</button><div class="dcard"><div class="dh"><div class="dh-top"><div class="dh-left"><i class="ti ${p.ic}" style="color:${m.color};font-size:26px"></i><div><div class="dh-title">${p.n}</div><div class="dh-sub">${p.s}</div></div></div><span class="dh-badge" style="background:${m.bg};color:${m.tc};border:1px solid ${m.tc}33">${m.label} · ${m.hz}</span></div><div class="dh-tags">${p.tags.map(t=>`<span class="dtag">${t}</span>`).join('')}</div></div><div class="dsec"><div class="dsec-title">Caractéristiques clés</div><div class="fields-grid">${p.f.map(f=>`<div class="fi"><div class="fi-l">${f.l}</div><div class="fi-v">${f.v}</div></div>`).join('')}</div></div><div class="dsec"><div class="dsec-title">Avantages & Inconvénients</div><div class="pc-grid"><div class="pcbox pros"><div class="pcbox-t">Avantages</div>${p.p.map(x=>`<div class="pci"><div class="pcdot"></div><span>${x}</span></div>`).join('')}</div><div class="pcbox cons"><div class="pcbox-t">Inconvénients</div>${p.c.map(x=>`<div class="pci"><div class="pcdot"></div><span>${x}</span></div>`).join('')}</div></div></div><div class="dsec" style="border-bottom:none"><div class="dsec-title">Conseil du formateur</div><div class="memo-box"><i class="ti ti-bulb" style="color:#B8860B;font-size:16px;flex-shrink:0;margin-top:1px"></i><div class="memo-text">${p.m}</div></div></div><div class="dnav"><button class="dnav-btn" onclick="oDet('${cat}',${idx-1})" ${!hp?'disabled':''}><i class="ti ti-arrow-left"></i> Précédent</button><span class="dnav-pos">${idx+1} / ${prods.length}</span><button class="dnav-btn" onclick="oDet('${cat}',${idx+1})" ${!hn?'disabled':''}>Suivant <i class="ti ti-arrow-right"></i></button></div></div>`);}
function rRecap(){show(`<div class="recap-wrap"><table class="rtable"><thead><tr><th>Type d'épargne</th><th>Horizon</th><th>Risque</th><th>Rendement</th><th>Disponibilité</th></tr></thead><tbody><tr class="rc"><td><strong>Court terme</strong></td><td>&lt; 2 ans</td><td>Très faible</td><td>Faible</td><td>Immédiate</td></tr><tr class="rm"><td><strong>Moyen terme</strong></td><td>2 à 8 ans</td><td>Faible à modéré</td><td>Moyen</td><td>Variable</td></tr><tr class="rl"><td><strong>Long terme</strong></td><td>&gt; 8 ans</td><td>Modéré à élevé</td><td>Élevé</td><td>Faible</td></tr></tbody></table><div style="font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Exemple de répartition — 20 000 €</div><div class="ex-grid"><div class="excard" style="border-top-color:#1D9E75"><div class="ex-lbl">Épargne de sécurité</div><div class="ex-prod">Livret A</div><div class="ex-obj">Disponibilité immédiate</div><div class="ex-amt" style="color:#0F6E56">5 000 €</div></div><div class="excard" style="border-top-color:#378ADD"><div class="ex-lbl">Projet voiture · 4 ans</div><div class="ex-prod">PEL</div><div class="ex-obj">Financement immobilier</div><div class="ex-amt" style="color:#185FA5">7 000 €</div></div><div class="excard" style="border-top-color:#7F77DD"><div class="ex-lbl">Préparation retraite</div><div class="ex-prod">Assurance-vie / PER</div><div class="ex-obj">Constitution patrimoine</div><div class="ex-amt" style="color:#534AB7">8 000 €</div></div></div><div class="kp-box"><div class="kp-hd">Points clés à retenir</div><div class="kpi"><div class="kpi-icon" style="background:#E1F5EE"><i class="ti ti-clock" style="color:#1D9E75;font-size:13px"></i></div><div class="kpi-text">L'épargne courte durée privilégie la <strong>sécurité</strong> et la <strong>disponibilité immédiate</strong> des fonds.</div></div><div class="kpi"><div class="kpi-icon" style="background:#E6F1FB"><i class="ti ti-calendar" style="color:#378ADD;font-size:13px"></i></div><div class="kpi-text">L'épargne moyenne durée permet de <strong>préparer des projets</strong> avec un meilleur rendement.</div></div><div class="kpi"><div class="kpi-icon" style="background:#EEEDFE"><i class="ti ti-trending-up" style="color:#7F77DD;font-size:13px"></i></div><div class="kpi-text">L'épargne longue durée vise la <strong>constitution d'un patrimoine</strong> et la préparation de la retraite.</div></div><div class="kpi"><div class="kpi-icon" style="background:#FDF3D0"><i class="ti ti-scale" style="color:#B8860B;font-size:13px"></i></div><div class="kpi-text">Plus le rendement potentiel est élevé, plus le <strong>risque est important</strong>. Le conseiller adapte sa recommandation au profil client.</div></div></div></div>`);}
function rQuiz(){quizState={};quizScore=0;const dots=QUIZ.map((_,i)=>`<div class="qpd" id="qpd${i}"></div>`).join('');const qs=QUIZ.map((q,qi)=>`<div class="qcard"><div class="qhd"><div class="qnum">Question ${qi+1} / ${QUIZ.length}</div><div class="qtext">${q.q}</div></div><div class="qopts">${q.o.map((o,oi)=>`<button class="qopt" id="qo${qi}_${oi}" onclick="ansQ(${qi},${oi})">${o}</button>`).join('')}</div><div class="qfb" id="qfb${qi}" style="display:none"></div></div>`).join('');show(`<div class="quiz-wrap"><div class="qprog">${dots}</div>${qs}<div class="score-box" id="qscore" style="display:none"><div class="score-ring"><span class="score-n" id="qsn"></span></div><div class="score-msg" id="qsm"></div><div class="score-sub" id="qss"></div><button class="reset-btn" onclick="rQuiz()">Recommencer le quiz</button></div></div>`);}
function ansQ(qi,oi){if(quizState[qi]!==undefined)return;quizState[qi]=oi;const q=QUIZ[qi];const ok=oi===q.a;if(ok)quizScore++;for(let i=0;i<q.o.length;i++){const b=document.getElementById('qo'+qi+'_'+i);b.disabled=true;if(i===q.a)b.classList.add('correct');else if(i===oi&&!ok)b.classList.add('wrong');}const fb=document.getElementById('qfb'+qi);fb.style.display='block';fb.className='qfb '+(ok?'ok':'ko');fb.innerHTML='<strong>'+(ok?'Correct !':'Incorrect.')+'</strong> '+q.e;const dot=document.getElementById('qpd'+qi);if(dot)dot.classList.add('done');if(Object.keys(quizState).length===QUIZ.length){setTimeout(()=>{const pct=Math.round(quizScore/QUIZ.length*100);document.getElementById('qsn').textContent=quizScore+'/'+QUIZ.length;document.getElementById('qsm').textContent=pct>=80?'Excellent travail !':pct>=60?'Bonne progression !':'Continuez à réviser.';document.getElementById('qss').textContent=pct+' % de bonnes réponses';document.getElementById('qscore').style.display='block';},400);}}
rAccueil();updProg();
</script>
